<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Buonaiuto Doc4LLM{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="dot"></span>
          Buonaiuto Doc4LLM
        </div>
        <div class="sidebar-version">v0.1.0 &middot; local</div>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
          <span class="nav-icon">&#9632;</span> Overview
        </a>
        <a href="/technologies" class="nav-link {% if active_page == 'technologies' %}active{% endif %}">
          <span class="nav-icon">&#9830;</span> Technologies
        </a>
        <a href="/query" class="nav-link {% if active_page == 'query' %}active{% endif %}">
          <span class="nav-icon">&#8981;</span> Query
        </a>
        <a href="/documents" class="nav-link {% if active_page == 'documents' %}active{% endif %}">
          <span class="nav-icon">&#9776;</span> Documents
        </a>
        <a href="/projects" class="nav-link {% if active_page == 'projects' %}active{% endif %}">
          <span class="nav-icon">&#9733;</span> Projects
        </a>
        <a href="/activity" class="nav-link {% if active_page == 'activity' %}active{% endif %}">
          <span class="nav-icon">&#8942;</span> Activity
        </a>
        <a href="/schedule" class="nav-link {% if active_page == 'schedule' %}active{% endif %}">
          <span class="nav-icon">&#8634;</span> Fetch &amp; Schedule
        </a>
      </nav>

      <div class="sidebar-footer">
        <div>{{ doc_count }} docs &middot; {{ tech_count }} techs</div>
        <div class="mt-4">last scan: {{ last_scan or "never" }}</div>
      </div>
    </aside>

    <main class="main">
      <div id="flash-container">
        {% block flash %}{% endblock %}
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
